services:
  mariadb:
    image: mariadb:11
    container_name: translation-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: translation_assistant
      MYSQL_USER: translation_user
      MYSQL_PASSWORD: translation_pass
    volumes:
      - mariadb_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci

volumes:
  mariadb_data:
